name: CI - MSRC Link

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - msrc_gui/**

jobs:
  macos:
    runs-on: macos-14

    steps:
      - name: Get actions code
        uses: actions/checkout@v4
        
      - name: Install QT
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
        
      - name: Git tags
        run: git fetch --prune --unshallow
      
      - name: Build
        run: |
          mkdir build
          cd build
          qmake ../msrc_gui
          make
          macdeployqt msrc_gui.app -dmg
        
      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: test-app
          path: build/msrc_gui.tgz

  
